name: snake_classic
description: "A new Flutter project."

publish_to: 'none'

version: 3.3.4+31

environment:
  # Bumped from ^3.9.0 — google_mobile_ads 8.0.0 requires Dart >= 3.10.0.
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # State management
  provider: ^6.1.2
  flutter_bloc: ^9.0.0
  bloc: ^9.0.0
  equatable: ^2.0.5
  flutter_riverpod: ^3.2.0

  # Dependency injection
  get_it: ^9.2.0

  # Functional programming helpers
  dartz: ^0.10.1
  
  # Audio system
  audioplayers: ^6.0.0
  flutter_soloud: ^4.0.6
  
  # Persistent storage
  shared_preferences: ^2.2.3

  # Drift database for offline-first storage
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.4
  path: ^1.9.0
  
  # Animations and effects
  flutter_animate: ^4.5.0

  # Custom fonts
  google_fonts: ^8.0.1
  
  # Vector math for game calculations
  vector_math: ^2.1.4
  
  # UUID for unique identifiers
  uuid: ^4.5.1

  # Native in-app review prompts (Google Play + StoreKit)
  in_app_review: ^2.0.10

  # Firebase dependencies
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.1
  google_sign_in: ^7.1.1
  firebase_analytics: ^12.0.0
  
  # Connectivity for offline/online detection
  connectivity_plus: ^7.0.0
  
  # Beautiful logging library
  talker: ^5.0.0
  talker_flutter: ^5.0.0
  
  # Enhanced UI components for auth
  flutter_dotenv: ^6.0.0
  font_awesome_flutter: ^11.0.0
  
  # Push notifications
  firebase_messaging: ^16.0.1
  flutter_local_notifications: ^22.0.0-dev.3
  # `timezone` is a transitive of flutter_local_notifications but we
  # reference it directly (for zonedSchedule's TZDateTime), so the
  # depend_on_referenced_packages lint requires an explicit entry.
  timezone: ^0.11.0
  
  # HTTP client for backend communication
  http: ^1.2.2

  # SignalR for real-time multiplayer (replaces WebSocket)
  signalr_netcore: ^1.3.7
  
  # In-app purchases for monetization
  in_app_purchase: ^3.2.3
  in_app_purchase_android: ^0.5.0+2

  # Ads (AdMob). Bundles the UMP consent SDK. Pro/trial users never see ads.
  google_mobile_ads: ^9.0.0
  # iOS App Tracking Transparency prompt (required alongside UMP on iOS 14+).
  app_tracking_transparency: ^2.0.7

  # URL launcher for external links
  url_launcher: ^6.3.1

  # In-app updates from Play Store
  in_app_update: ^4.2.3

  # Declarative routing
  go_router: ^17.1.0

  # For Splash Screen
  flutter_native_splash: ^2.4.6
  package_info_plus: ^10.1.0
  flame: ^1.37.0
  flame_bloc: ^1.12.23

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

  flutter_launcher_icons: "^0.14.4"

  # Drift code generation
  drift_dev: ^2.18.0
  build_runner: ^2.4.9

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/audio/
    - assets/images/
    - PRIVACY.md
    - .env
    # - assets/images/
    # - assets/fonts/
